services:
  - type: web
    name: rarecandy-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-name.vercel.app
      - key: FLESS
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
